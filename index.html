<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart PDF & Image Editor - Enhanced Signature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="loadingScreen" class="loading-overlay flex-col">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
    <p id="loadingText" class="text-sm font-medium tracking-wide">Memproses Dokumen...</p>
</div>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar-tools p-5 flex flex-col gap-6">
        <div>
            <h1 class="text-xl font-bold text-slate-800">PDF Editor <span class="text-indigo-600">Pro</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Workspace v2.1</p>
        </div>

        <div class="space-y-3">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">1. Dokumen & Foto</label>
            <div onclick="document.getElementById('fileInput').click()"
                 class="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:bg-indigo-50 hover:border-indigo-300 transition-all cursor-pointer group">
                <input type="file" id="fileInput" multiple accept="application/pdf,image/*" class="hidden">
                <span class="text-2xl group-hover:scale-110 transition-transform inline-block">📁</span>
                <p class="text-xs font-bold text-slate-600 mt-2">Upload PDF/Foto</p>
            </div>
        </div>

        <!-- Area Tanda Tangan -->
        <div class="space-y-3 flex-1 flex flex-col">
            <div class="flex justify-between items-center">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">2. Area TTD</label>
                <div class="flex gap-2">
                    <button onclick="undoSig()" title="Undo" class="p-1 hover:bg-slate-100 rounded text-slate-500 transition-colors">↺</button>
                    <button onclick="exportSig()" title="Export PNG" class="p-1 hover:bg-slate-100 rounded text-indigo-500 transition-colors">💾</button>
                </div>
            </div>
            <div class="bg-slate-50 p-1 rounded-xl">
                <canvas id="signaturePad"></canvas>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="clearSig()" class="py-2 text-[10px] font-bold bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors">HAPUS</button>
                <button onclick="document.getElementById('importInput').click()" class="py-2 text-[10px] font-bold bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-colors">IMPORT</button>
                <input type="file" id="importInput" accept="image/*" class="hidden" onchange="importSig(event)">
            </div>
            <button onclick="applySig()" class="w-full py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all active:scale-95">
                PASANG KE DOKUMEN
            </button>
        </div>

        <div class="pt-4 border-t border-slate-100">
            <button onclick="downloadResult()" class="w-full bg-slate-900 text-white py-3 rounded-xl text-xs font-bold hover:bg-black transition-all flex items-center justify-center gap-2">
                <span>Download Hasil Akhir</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </button>
            <button onclick="location.reload()" class="w-full text-red-500 text-[10px] font-bold mt-3 hover:underline">RESET SEMUA</button>
        </div>
    </aside>

    <!-- Rail Thumbnail (Tengah) -->
    <nav class="thumbnail-rail">
        <div id="thumbEmpty" class="h-full flex flex-col items-center justify-center text-slate-300 text-center px-4">
            <p class="text-[10px] font-bold uppercase">Halaman</p>
        </div>
        <div id="thumbContainer"></div>
    </nav>

    <!-- Main Workspace (Kanan) -->
    <main class="main-viewport">
        <div id="mainEmpty" class="h-full flex flex-col items-center justify-center text-slate-400">
            <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <p class="text-sm font-medium">Belum ada dokumen yang dimuat.</p>
        </div>
        <div id="mainContainer"></div>
    </main>
</div>
<script src="app.js"></script>
</body>
</html>
